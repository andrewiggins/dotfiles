name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly on Monday at 9 AM UTC
    - cron: "0 9 * * 1"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: ShellCheck shell scripts
        run: |
          shellcheck install.sh
          shellcheck scripts/*.sh
          shellcheck tests/*.sh

      - name: Dry-run install
        run: bash tests/dry-run.sh
